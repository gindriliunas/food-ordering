name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Install backend dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Lint backend
        run: npm run lint

      - name: Typecheck backend
        run: npm run typecheck

      - name: Test backend
        run: npm test

      - name: Build backend
        run: npm run build

      - name: Build Vue frontend
        run: npm run build
        working-directory: frontend

      - name: Verify Lambda bundles exist
        run: |
          for handler in createOrder getOrder listOrders processOrder authorizer; do
            test -f "dist/${handler}.js" || (echo "Missing dist/${handler}.js" && exit 1)
          done
          test -f "frontend/dist/index.html" || (echo "Missing frontend/dist/index.html" && exit 1)

