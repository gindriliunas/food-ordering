name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Install backend dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Lint backend
        run: npm run lint

      - name: Typecheck backend
        run: npm run typecheck

      - name: Test backend
        run: npm test

      - name: Build backend
        run: npm run build

      - name: Build Vue frontend
        run: npm run build
        working-directory: frontend
        env:
          VITE_API_URL: https://example.com
          VITE_COGNITO_USER_POOL_ID: eu-west-2_example
          VITE_COGNITO_CLIENT_ID: example-client-id

      - name: Verify Lambda bundles exist
        run: |
          for handler in createOrder getOrder listOrders deleteOrder processOrder; do
            test -f "dist/${handler}.js" || (echo "Missing dist/${handler}.js" && exit 1)
          done
          test -f "frontend/dist/index.html" || (echo "Missing frontend/dist/index.html" && exit 1)

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform fmt check
        run: terraform fmt -check -recursive
        working-directory: terraform

      - name: Terraform init
        run: terraform init -backend=false
        working-directory: terraform

      - name: Terraform validate
        run: terraform validate
        working-directory: terraform

      - name: tfsec scan
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: terraform
          soft_fail: false
          additional_args: --minimum-severity HIGH

      - name: npm audit backend
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: npm audit frontend
        run: npm audit --audit-level=high
        working-directory: frontend
        continue-on-error: true

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install backend dependencies
        run: npm ci

      - name: Build backend Lambdas
        run: npm run build

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        run: terraform init
        working-directory: terraform

      - name: Terraform apply
        run: terraform apply -auto-approve
        working-directory: terraform

      - name: Build frontend with deployed Cognito config
        run: |
          echo "VITE_API_URL=$(terraform -chdir=terraform output -raw api_url)" >> frontend/.env.production
          echo "VITE_COGNITO_USER_POOL_ID=$(terraform -chdir=terraform output -raw cognito_user_pool_id)" >> frontend/.env.production
          echo "VITE_COGNITO_CLIENT_ID=$(terraform -chdir=terraform output -raw cognito_client_id)" >> frontend/.env.production
          npm --prefix frontend run build

      - name: Deploy frontend to S3
        run: |
          aws s3 sync frontend/dist "s3://$(terraform -chdir=terraform output -raw frontend_bucket_name)" --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "$(terraform -chdir=terraform output -raw cloudfront_distribution_id)" \
            --paths "/*"
